<!DOCTYPE html>
<html>
<head>
    <title>Project Manager</title>
</head>
<body>

    <h1>Project Management Tool</h1>

    <a href="/create-project/">Create Project</a>

    <hr>

    {% for project in projects %}
        <h2>{{ project.name }}</h2>
        <p>{{ project.description }}</p>

        <a href="/project/{{ project.id }}/">
            Open Project
        </a>

        <hr>
    {% endfor %}

</body>
</html>
